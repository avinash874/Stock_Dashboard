<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stock Data Intelligence Dashboard</title>
    <link rel="stylesheet" href="/assets/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
    <script src="/assets/app.js" defer></script>
  </head>
  <body>
    <header class="top">
      <div>
        <h1>Stock Data Intelligence</h1>
        <p class="sub">NSE data via yfinance · metrics · comparison · demo ML trend</p>
      </div>
      <div class="toolbar">
        <label>
          Range
          <select id="rangeDays">
            <option value="30" selected>30 days</option>
            <option value="90">90 days</option>
          </select>
        </label>
        <label class="check">
          <input type="checkbox" id="showMA" checked />
          Show 7d MA
        </label>
        <label class="check">
          <input type="checkbox" id="showPred" />
          ML trend (linear)
        </label>
      </div>
    </header>

    <div class="layout">
      <aside class="sidebar">
        <h2>Companies</h2>
        <input type="search" id="companySearch" placeholder="Filter…" autocomplete="off" />
        <ul id="companyList" class="list"></ul>

        <h3>Compare</h3>
        <div class="compare-row">
          <select id="cmpA"></select>
          <select id="cmpB"></select>
          <button type="button" id="btnCompare">Compare</button>
        </div>

        <h3>Top movers <span id="moverWindow" class="muted"></span></h3>
        <div class="movers">
          <div>
            <h4>Gainers</h4>
            <ul id="gainers"></ul>
          </div>
          <div>
            <h4>Losers</h4>
            <ul id="losers"></ul>
          </div>
        </div>
      </aside>

      <main class="main">
        <div id="chartCard" class="card hidden">
          <div class="card-head">
            <h2 id="chartTitle">—</h2>
            <p id="chartMeta" class="muted"></p>
          </div>
          <canvas id="priceChart" height="120"></canvas>
        </div>

        <div id="compareCard" class="card hidden">
          <div class="card-head">
            <h2 id="compareTitle">Comparison</h2>
            <p id="compareMeta" class="muted"></p>
          </div>
          <canvas id="compareChart" height="120"></canvas>
        </div>

        <div id="summaryCard" class="card hidden">
          <h3>Summary</h3>
          <dl id="summaryDl" class="grid-dl"></dl>
        </div>

        <p id="err" class="error hidden"></p>
      </main>
    </div>

    <footer class="foot">
      <span>Educational demo — not investment advice.</span>
      <a href="/docs" target="_blank" rel="noopener">Swagger UI</a>
    </footer>
  </body>
</html>
